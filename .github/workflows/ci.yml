name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  django:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bookhaven_ci
          POSTGRES_USER: bookhaven
          POSTGRES_PASSWORD: bookhaven_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookhaven -d bookhaven_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-for-tests
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      POSTGRES_DB: bookhaven_ci
      POSTGRES_USER: bookhaven
      POSTGRES_PASSWORD: bookhaven_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Build Docker image
        run: docker build -t bookhaven-django:ci .

      - name: Verify Docker Compose config
        run: docker compose -f docker-compose.yml config

      - name: Verify Docker Compose build
        run: docker compose -f docker-compose.yml build
