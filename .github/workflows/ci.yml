name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  django:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/epicreads-django
      DJANGO_SECRET_KEY: ci-secret-key-for-tests
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      POSTGRES_DB: bookhaven_ci
      POSTGRES_USER: bookhaven
      POSTGRES_PASSWORD: bookhaven_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bookhaven_ci
          POSTGRES_USER: bookhaven
          POSTGRES_PASSWORD: bookhaven_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookhaven -d bookhaven_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Build Docker image
        run: docker build -t bookhaven-django:ci -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Verify Docker Compose config
        run: docker compose -f docker-compose.yml config

      - name: Verify Docker Compose build
        run: docker compose -f docker-compose.yml build

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
