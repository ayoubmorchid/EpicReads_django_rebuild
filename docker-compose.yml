services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookhaven}
      POSTGRES_USER: ${POSTGRES_USER:-bookhaven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookhaven_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookhaven} -d ${POSTGRES_DB:-bookhaven}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DJANGO_SERVE_MEDIA: ${DJANGO_SERVE_MEDIA:-True}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bookhaven}
      POSTGRES_USER: ${POSTGRES_USER:-bookhaven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookhaven_password}
      DJANGO_STATIC_ROOT: /app/staticfiles
      DJANGO_MEDIA_ROOT: /app/media
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
